<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Claude's Brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,700;0,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--black:#080810;--card:#1a1a28;--border:#2a2a3d;--gold:#C9A227;--gold-lt:#e8c14a;--red:#C0392B;--white:#FFFFFF;--text:#d4d4e8;--muted:#7a7a9a}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.7;min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,162,39,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,162,39,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:48px 40px;width:100%;max-width:400px;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.login-brand{font-family:'Roboto',sans-serif;font-weight:900;font-size:1.6rem;letter-spacing:.08em;color:var(--gold);text-align:center;margin-bottom:8px}
.login-sub{text-align:center;font-size:.88rem;color:var(--muted);margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.form-group input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:12px 16px;color:var(--white);font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--gold)}
.btn-login{width:100%;background:var(--gold);color:var(--black);font-weight:700;font-size:.95rem;padding:14px;border:none;border-radius:6px;cursor:pointer;transition:all .2s;font-family:inherit;margin-top:8px}
.btn-login:hover{background:var(--gold-lt);transform:translateY(-1px)}
.flash-error{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);border-radius:6px;padding:10px 16px;margin-bottom:20px;font-size:.88rem;color:#e55;text-align:center}
.back-link{display:block;text-align:center;margin-top:20px;font-size:.82rem;color:var(--muted);text-decoration:none}
.back-link:hover{color:var(--gold)}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-brand">Claude's Brain</div>
  <div class="login-sub">Admin Dashboard</div>

  {% with messages = get_flashed_messages() %}
  {% if messages %}
  {% for msg in messages %}
  <div class="flash-error">{{ msg }}</div>
  {% endfor %}
  {% endif %}
  {% endwith %}

  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>
  <a class="back-link" href="/">&larr; Back to site</a>
</div>

</body>
</html>
